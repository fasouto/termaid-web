<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>termaid — Mermaid diagrams in your terminal</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #181825;
            --border: #313244;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --accent: #89b4fa;
            --accent-hover: #74c7ec;
            --green: #a6e3a1;
            --yellow: #f9e2af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            padding: 2rem 2rem 1rem;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            color: var(--subtext);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .install {
            display: inline-block;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            color: var(--green);
            margin-bottom: 0.5rem;
        }

        .links {
            margin-top: 0.75rem;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            margin: 0 0.75rem;
            font-size: 0.95rem;
        }

        .links a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .examples-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem 2rem;
        }

        .examples-bar button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
        }

        .examples-bar button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .examples-bar button.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 0 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--subtext);
            font-weight: 600;
        }

        .panel-header button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.35rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: background 0.15s;
        }

        .panel-header button:hover {
            background: var(--accent-hover);
        }

        .panel-header button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #render-btn {
            background: var(--green);
        }

        #render-btn:hover {
            background: #b4e8a8;
        }

        textarea {
            flex: 1;
            background: var(--bg);
            color: var(--text);
            border: none;
            padding: 1rem;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: none;
            min-height: 400px;
            outline: none;
        }

        #output {
            flex: 1;
            background: var(--bg);
            padding: 1rem;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.8rem;
            line-height: 1.3;
            white-space: pre;
            overflow: auto;
            min-height: 400px;
            color: var(--text);
        }

        .status {
            font-size: 0.8rem;
            color: var(--subtext);
        }

        .status.loading {
            color: var(--yellow);
        }

        .status.ready {
            color: var(--green);
        }

        .status.error {
            color: #f38ba8;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--subtext);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
                padding: 0 1rem 1rem;
            }
            header { padding: 1.5rem 1rem 0.75rem; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1><span>termaid</span></h1>
        <p>Render Mermaid diagrams as Unicode art in your terminal</p>
        <code class="install">pip install termaid</code>
        <div class="links">
            <a href="https://github.com/fasouto/termaid">GitHub</a>
            <a href="https://pypi.org/project/termaid/">PyPI</a>
        </div>
    </header>

    <div class="examples-bar" id="examples-bar"></div>

    <div class="editor-container">
        <div class="panel">
            <div class="panel-header">
                <span>Mermaid Code</span>
                <button id="render-btn" onclick="renderDiagram()">Render</button>
            </div>
            <textarea id="input" spellcheck="false"></textarea>
        </div>
        <div class="panel">
            <div class="panel-header">
                <span>Unicode Output</span>
                <span>
                    <span id="status" class="status"></span>
                    <button onclick="copyOutput()">Copy</button>
                </span>
            </div>
            <div id="output"></div>
        </div>
    </div>

    <footer>
        Pure Python, zero dependencies. 9 diagram types supported.<br>
        Built by <a href="https://github.com/fasouto">fasouto</a>
    </footer>

    <script>
        let pyodide = null;
        let pyodideLoading = false;
        let examples = {};

        const EXAMPLE_LABELS = {
            flowchart: 'Flowchart',
            sequence: 'Sequence',
            class: 'Class',
            er: 'ER Diagram',
            state: 'State',
            block: 'Block',
            git: 'Git Graph',
            pie: 'Pie Chart',
            treemap: 'Treemap'
        };

        async function init() {
            const resp = await fetch('examples.json');
            examples = await resp.json();

            const bar = document.getElementById('examples-bar');
            for (const [key, label] of Object.entries(EXAMPLE_LABELS)) {
                const btn = document.createElement('button');
                btn.textContent = label;
                btn.dataset.key = key;
                btn.onclick = () => loadExample(key);
                bar.appendChild(btn);
            }

            loadExample('flowchart');
        }

        function loadExample(key) {
            const ex = examples[key];
            if (!ex) return;

            document.getElementById('input').value = ex.source;
            document.getElementById('output').textContent = ex.output;

            document.querySelectorAll('.examples-bar button').forEach(b => {
                b.classList.toggle('active', b.dataset.key === key);
            });
        }

        async function loadPyodide() {
            if (pyodide) return pyodide;
            if (pyodideLoading) {
                while (!pyodide) await new Promise(r => setTimeout(r, 100));
                return pyodide;
            }

            pyodideLoading = true;
            setStatus('Loading Python runtime...', 'loading');

            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/pyodide/v0.27.4/full/pyodide.js';
            document.head.appendChild(script);

            await new Promise((resolve, reject) => {
                script.onload = resolve;
                script.onerror = reject;
            });

            pyodide = await loadPyodide();
            setStatus('Installing termaid...', 'loading');
            await pyodide.loadPackage('micropip');
            const micropip = pyodide.pyimport('micropip');
            await micropip.install('termaid');

            setStatus('Ready', 'ready');
            return pyodide;
        }

        async function renderDiagram() {
            const input = document.getElementById('input').value;
            const btn = document.getElementById('render-btn');

            btn.disabled = true;
            btn.textContent = 'Loading...';

            try {
                const py = await loadPyodide();

                py.globals.set('_input', input);
                const result = py.runPython(`
from termaid import render
render(_input)
`);
                document.getElementById('output').textContent = result;
                setStatus('Rendered', 'ready');
            } catch (e) {
                document.getElementById('output').textContent = 'Error: ' + e.message;
                setStatus('Error', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Render';
            }
        }

        function copyOutput() {
            const text = document.getElementById('output').textContent;
            navigator.clipboard.writeText(text);
        }

        function setStatus(msg, cls) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + cls;
        }

        // Ctrl+Enter to render
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                renderDiagram();
            }
        });

        init();
    </script>
</body>
</html>
